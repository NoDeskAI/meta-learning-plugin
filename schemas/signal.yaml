signal:
  type: object
  required:
    - signal_id
    - timestamp
    - session_id
    - detection_channels
    - primary_channel
    - keywords
    - task_summary
    - step_count
  properties:
    signal_id:
      type: string
      pattern: "^sig-\\d{8}-\\d{3,}$"
      description: "Unique signal identifier, format: sig-YYYYMMDD-NNN"
    timestamp:
      type: string
      format: date-time
    session_id:
      type: string
      description: "UUID of the source session (maps to agents/main/sessions/{uuid}.jsonl)"
    memory_date:
      type: string
      format: date
      description: "Date key for memory/YYYY-MM-DD.md (optional supplementary context)"
    detection_channels:
      type: array
      items:
        type: string
        enum:
          - user_correction
          - self_recovery
          - unresolved_error
          - new_tool
          - efficiency_anomaly
      minItems: 1
      description: "Multi-label detection channels (orthogonal, non-exclusive)"
    primary_channel:
      type: string
      enum:
        - user_correction
        - self_recovery
        - unresolved_error
        - new_tool
        - efficiency_anomaly
      description: "Highest-priority channel from detection_channels"
    keywords:
      type: array
      items:
        type: string
      minItems: 1
    task_summary:
      type: string
      maxLength: 200
    error_snapshot:
      type: string
      nullable: true
      description: "Populated when self_recovery or unresolved_error is in detection_channels"
    resolution_snapshot:
      type: string
      nullable: true
    user_feedback:
      type: string
      nullable: true
    image_snapshots:
      type: array
      items:
        type: string
      default: []
      description: "File paths to image snapshots captured during the session (multimodal support)"
    step_count:
      type: integer
      minimum: 1
    processed:
      type: boolean
      default: false
      description: "Set to true after Layer 2 materialization"
    experiment_id:
      type: string
      nullable: true
      description: "A/B experiment identifier, populated from config when experiment is enabled"
    experiment_group:
      type: string
      nullable: true
      enum:
        - A
        - B
        - control
      description: "Experiment group assignment (A, B, or control)"
