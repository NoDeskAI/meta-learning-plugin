workspace_root: "~/.openclaw/workspace"
sessions_root: "~/.openclaw/agents/main/sessions"

signal_buffer_dir: "signal_buffer"
experience_pool_dir: "experience_pool"
error_taxonomy_path: "error_taxonomy.yaml"
skills_dir: "skills"

layer1:
  quick_think:
    irreversible_keywords:
      - "rm -rf"
      - "drop table"
      - "force push"
      - "git push --force"
      - "DELETE FROM"
      - "overwrite"
      - "truncate"
      - "format disk"
      - "fdisk"
      - "mkfs"
    max_latency_ms: 50
  signal_capture:
    efficiency_anomaly_threshold: 2.0
    average_step_count: 5

layer2:
  trigger:
    min_pending_signals: 5
    max_hours_since_last: 24
  materialize:
    initial_confidence: 0.6
  consolidate:
    min_cluster_size_for_taxonomy: 3
  taxonomy:
    min_confidence_for_skill: 0.8
    min_source_exps_for_skill: 5

layer3:
  min_experiences_for_cross_task: 3
  min_pattern_confidence: 0.6
  efficiency_anomaly_factor: 2.0
  min_gap_occurrences: 3
  prune_confidence_threshold: 0.5
  prune_unused_days: 30

confidence:
  hit_success_boost: 0.1
  contradiction_penalty: 0.2
  prune_threshold: 0.3
  promote_threshold: 0.8
  decay_enabled: true
  decay_base: 0.95

llm:
  provider: "stub"
  model: "gpt-4o"
  temperature: 0.3
  max_tokens: 2000
